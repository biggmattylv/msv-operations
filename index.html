<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophie Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="bg-dark text-white text-center py-3">
        <h1 class="display-4">Sophie Dashboard</h1>
    </header>
    <div class="container my-4">
        <section id="overview" class="p-3 bg-light rounded shadow-sm mb-4">
            <h2 class="mb-3">Overview</h2>
            <p>Welcome to your Sophie Dashboard. This is a placeholder for your operational data.</p>
        </section>
        <section id="metrics" class="p-3 bg-light rounded shadow-sm mb-4">
            <h2 class="mb-3">Key Metrics</h2>
            <ul class="list-group">
                <li class="list-group-item d-flex justify-content-between align-items-center">Metric 1: <span id="metric1" class="badge bg-primary rounded-pill">Loading...</span></li>
                <li class="list-group-item d-flex justify-content-between align-items-center">Metric 2: <span id="metric2" class="badge bg-primary rounded-pill">Loading...</span></li>
            </ul>
        </section>
        <section id="logs" class="p-3 bg-light rounded shadow-sm mb-4">
            <h2 class="mb-3">Recent Logs</h2>
            <div id="log-output" class="bg-white border p-3 rounded" style="min-height: 100px; overflow-y: auto;">
                <!-- Log entries will be loaded here by script.js -->
                <p>No logs available yet.</p>
            </div>
        </section>
    </div>
    <footer class="bg-dark text-white text-center py-3">
        <p>&copy; 2024 Sophie Dashboard</p>
    </footer>

    <!-- Bootstrap JS (Popper.js first, then Bootstrap JS) -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlco4sjoZ5nqwkXwh/zfgfgQYV4yTCHwR+igS+qgePfS4N" crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>
</html>
