<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophie Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Sophie Dashboard</h1>
    </header>
    <main>
        <section id="overview">
            <h2>Overview</h2>
            <p>Welcome to your Sophie Dashboard. This is a placeholder for your operational data.</p>
        </section>
        <section id="metrics">
            <h2>Key Metrics</h2>
            <ul>
                <li>Metric 1: <span id="metric1">Loading...</span></li>
                <li>Metric 2: <span id="metric2">Loading...</span></li>
            </ul>
        </section>
        <section id="logs">
            <h2>Recent Logs</h2>
            <div id="log-output">
                <!-- Log entries will be loaded here by script.js -->
                <p>No logs available yet.</p>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2024 Sophie Dashboard</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
